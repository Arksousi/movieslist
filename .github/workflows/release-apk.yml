name: Release APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Required so the build job can create/replace the GitHub Release.
permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.5
  JAVA_VERSION: "17"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # pubspec.yaml declares .env as a bundled asset, so the build fails
      # without it. The real token lives in a repository secret.
      - name: Create .env
        run: echo "TMDB_TOKEN=${{ secrets.TMDB_TOKEN }}" > .env

      - run: flutter pub get

      - run: flutter analyze

      # Bare `flutter test` errors out when there is no test/ directory.
      - name: Run tests
        if: hashFiles('test/**') != ''
        run: flutter test

  build-and-release:
    name: Build & publish APK
    needs: analyze
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create .env
        run: echo "TMDB_TOKEN=${{ secrets.TMDB_TOKEN }}" > .env

      # A fresh runner would otherwise generate a NEW debug keystore each run,
      # giving every APK a different signature and breaking in-place updates.
      - name: Restore release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - run: flutter pub get

      # run_number gives a monotonically increasing versionCode, so Android
      # treats each new APK as an upgrade rather than a sideways reinstall.
      - name: Build release APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      # Stable filename => stable permanent download URL.
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk movies.apk

      - uses: actions/upload-artifact@v4
        with:
          name: movies-apk
          path: movies.apk

      # Roll the `latest` release forward. --cleanup-tag deletes the stale tag
      # so it re-points at this commit; `|| true` lets the very first run pass.
      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest movies.apk \
            --title "Latest build (#${{ github.run_number }})" \
            --prerelease \
            --notes "Automated build of \`${{ github.sha }}\`.

          Download **movies.apk** below, or use the permanent link:
          https://github.com/${{ github.repository }}/releases/latest/download/movies.apk"
