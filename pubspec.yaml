name: movies
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  dio: ^5.10.0
  flutter_dotenv: ^5.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  sqflite: ^2.4.3
  path: ^1.9.1
  youtube_player_flutter: ^10.0.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env

# App icon generation. Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/dy1logo.png"
  # Fill the icon background so the popcorn box isn't transparent on launchers.
  background_color_hex: "#FFFFFF"
  android: true
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
    icon_size: 48
  macos:
    generate: true
